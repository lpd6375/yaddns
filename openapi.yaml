openapi: 3.0.0
info:
  title: icmp-ddns Admin API
  version: 1.0.0
paths:
  /admin/config:
    get:
      summary: Get current configuration (masked)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Update configuration
      security:
        - bearerAuth: []
      requestBody:
        required: true
      responses:
        '204':
          description: Saved
  /admin/backups:
    get:
      summary: List backups
      security:
        - bearerAuth: []
      responses:
        '200':
          description: list
  /admin/backups/restore:
    post:
      summary: Restore backup file
      security:
        - bearerAuth: []
      requestBody:
        required: true
      responses:
        '204':
          description: restored
  /admin/health:
    get:
      summary: Service health and status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /admin/logs:
    get:
      summary: Tail application logs
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: lines
  /admin/audit:
    get:
      summary: Tail audit logs (JSON entries)
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: entries
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: metrics
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
